<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Meeting Weave 会议编排器：根据会议目标、人数和时长，生成一份更紧凑的会议结构建议。"
    />
    <meta name="theme-color" content="#121024" />
    <title>Meeting Weave 会议编排器 | DemoCodex</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23665df0'/%3E%3Cstop offset='1' stop-color='%23131a38'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Crect x='12' y='14' width='40' height='10' rx='5' fill='%2398f5ff' opacity='.88'/%3E%3Crect x='12' y='28' width='24' height='10' rx='5' fill='%23f7b267' opacity='.9'/%3E%3Crect x='24' y='42' width='28' height='10' rx='5' fill='%239ef0b3' opacity='.9'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="src/css/meeting-weave.css" />
  </head>
  <body class="meeting-page">
    <main class="meeting-shell">
      <section class="meeting-hero">
        <a class="meeting-back" href="index.html">返回首页</a>
        <p class="meeting-hero__eyebrow">Goal · Headcount · Duration</p>
        <h1 class="meeting-hero__title">Meeting Weave / 会议编排器</h1>
        <p class="meeting-hero__lead">
          输入会议目标、人数和时长，系统会给出一份可直接拿去主持的会议结构：
          该讲什么、该花多久、谁来收口、会后怎么落地。
        </p>
      </section>

      <section class="meeting-layout" aria-label="会议编排工具">
        <section class="meeting-panel meeting-panel--form">
          <div class="meeting-panel__header">
            <h2>输入信息</h2>
            <p>会议越短，结构越重要；人越多，边界越需要清晰。</p>
          </div>

          <form id="meeting-form" class="meeting-form">
            <label class="meeting-field">
              <span>会议名称</span>
              <input
                id="meeting-title"
                name="meeting-title"
                type="text"
                placeholder="例如：版本评审、团队同步、方案决策"
                autocomplete="off"
              />
            </label>

            <label class="meeting-field">
              <span>会议目标</span>
              <select id="meeting-goal" name="meeting-goal">
                <option value="decision" selected>做决定</option>
                <option value="sync">状态同步</option>
                <option value="brainstorm">头脑风暴</option>
                <option value="review">评审复盘</option>
                <option value="kickoff">启动对齐</option>
                <option value="one-on-one">一对一沟通</option>
              </select>
            </label>

            <label class="meeting-field">
              <span>参与人数</span>
              <input id="meeting-headcount" name="meeting-headcount" type="number" min="2" max="24" step="1" value="6" />
            </label>

            <label class="meeting-field">
              <span>时长（分钟）</span>
              <select id="meeting-duration" name="meeting-duration">
                <option value="15">15</option>
                <option value="30" selected>30</option>
                <option value="45">45</option>
                <option value="60">60</option>
                <option value="75">75</option>
                <option value="90">90</option>
              </select>
            </label>

            <div class="meeting-actions">
              <button class="meeting-button" type="submit">生成结构</button>
              <button class="meeting-button meeting-button--ghost" id="meeting-reset" type="reset">
                重置默认值
              </button>
            </div>

            <p class="meeting-note">
              提示：人数越多，越适合用时间盒和轮次；时长越短，越要把开场和结尾压缩。
            </p>
          </form>
        </section>

        <section
          class="meeting-panel meeting-panel--result"
          id="meeting-result"
          tabindex="-1"
          aria-live="polite"
        >
          <div class="meeting-panel__header">
            <h2>编排结果</h2>
            <p>这是一份适合主持人直接照着跑的会议脚本。</p>
          </div>

          <div class="meeting-empty" id="meeting-empty">
            输入信息后，这里会生成会议结构、时间分配、主持规则和会后动作。
          </div>

          <div class="meeting-result" id="meeting-result-body" hidden>
            <div class="meeting-result__summary">
              <p class="meeting-result__eyebrow" id="meeting-mode"></p>
              <h3 class="meeting-result__title" id="meeting-title-display"></h3>
              <p class="meeting-result__lead" id="meeting-lead"></p>
              <div class="meeting-meta" id="meeting-meta"></div>
            </div>

            <div class="meeting-grid">
              <article class="meeting-card">
                <h3>时间结构</h3>
                <ol class="meeting-timeline" id="meeting-timeline"></ol>
              </article>

              <article class="meeting-card">
                <h3>主持规则</h3>
                <div id="meeting-rules"></div>
              </article>

              <article class="meeting-card">
                <h3>会前准备</h3>
                <div id="meeting-prep"></div>
              </article>

              <article class="meeting-card">
                <h3>会后收口</h3>
                <div id="meeting-close"></div>
              </article>
            </div>

            <div class="meeting-actions meeting-actions--result">
              <button class="meeting-button" id="meeting-regenerate" type="button">再生成一次</button>
              <button class="meeting-button meeting-button--ghost" id="meeting-clear" type="button">
                清空结果
              </button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="src/js/meeting-weave.js"></script>
  </body>
</html>
