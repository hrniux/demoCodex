<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="DemoCodex 浏览器小游戏与互动实验合集，包含像素风作品、策略关卡和简洁实用的实验页面。"
  />
  <title>DemoCodex 游戏合集</title>
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2307111f'/%3E%3Cpath d='M14 42 32 14l18 28Z' fill='%237dd3fc'/%3E%3Cpath d='M24 39h16v7H24z' fill='%23e2e8f0'/%3E%3C/svg%3E"
  />
  <link rel="stylesheet" href="src/css/index-menu.css" />
</head>
<body>
  <main class="menu-shell">
    <header class="menu-hero">
      <p class="menu-hero__eyebrow">DemoCodex</p>
      <h1 class="menu-hero__title">游戏合集与互动实验</h1>
      <p class="menu-hero__subtitle" id="menu-subtitle">
        精品 HTML5 游戏 · 纯原生 JavaScript · 零依赖
      </p>
      <div class="menu-hero__meta" aria-label="页面概览">
        <div class="menu-pill">
          <strong id="menu-total">27</strong>
          <span>个主推作品</span>
        </div>
        <div class="menu-pill">
          <strong id="menu-featured">2</strong>
          <span>个重点推荐</span>
        </div>
        <div class="menu-pill">
          <strong>100%</strong>
          <span>原生前端</span>
        </div>
      </div>
    </header>

    <section class="menu-section" aria-labelledby="menu-section-title">
      <div class="menu-section__header">
        <p class="menu-section__eyebrow">Main Menu</p>
        <h2 id="menu-section-title">点击卡片进入对应页面</h2>
        <p>
          首页只承担导航职责，所有内容页都保持独立可打开、可直达。
        </p>
      </div>
      <div class="menu-grid" id="games-grid" aria-live="polite" aria-busy="true"></div>
    </section>

    <footer class="menu-footer">
      <p><strong>DemoCodex</strong> - 精品 HTML5 游戏合集</p>
      <p>纯原生 JavaScript · 零外部依赖 · 开源免费</p>
      <a class="menu-footer__link" href="https://github.com/hrniux/demoCodex">GitHub</a>
    </footer>

    <noscript>
      <p class="menu-noscript">
        这个页面需要 JavaScript 才能渲染导航卡片。请启用脚本后重新打开。
      </p>
    </noscript>
  </main>

  <script src="src/js/index-menu.js" defer></script>
</body>
</html>
