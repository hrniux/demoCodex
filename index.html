<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="DemoCodex Stick-Fighter: HTML5 canvas-based fighting game demo" />
    <title>DemoCodex Stick-Fighter</title>
    <link rel="preconnect" href="self" />
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <main class="game" aria-label="Stick figure fighting game">
      <section class="game__canvas-wrap">
        <canvas id="game" width="960" height="540" role="img" aria-label="游戏画面：火柴人对战，带有平台与场景"></canvas>
      </section>

      <section class="hud" aria-live="polite" aria-atomic="true">
        <div class="hud__row">
          <div class="hud__bar hud__bar--hp" id="hud-hp" aria-label="玩家生命条" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100"></div>
          <div class="hud__bar hud__bar--stamina" id="hud-stamina" aria-label="玩家体力条" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100"></div>
          <div class="hud__bar hud__bar--energy" id="hud-energy" aria-label="玩家能量条" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100"></div>
        </div>
        <div class="hud__skills" id="hud-skills" aria-label="技能冷却"></div>
        <div class="hud__tips" id="hud-tips"></div>
      </section>

      <section class="controls" aria-label="控制说明">
        <div class="controls__row">
          <span>移动: A/D D或B ←/→</span>
          <span>跳跃: W/空格 (两段)</span>
          <span>闪避: Shift</span>
          <span>格挡: K(按住)</span>
          <span>普攻: J</span>
        </div>
        <div class="controls__row">
          <span>技能: 1-风, 2-土, 3-水, 4-火, 5-雷</span>
          <span>暂停: P</span>
          <span>静音: M</span>
          <span>重开: R</span>
        </div>
      </section>

      <button class="hud__btn" id="btn-pause" aria-pressed="false" aria-label="暂停或继续">暂停</button>
      <button class="hud__btn" id="btn-mute" aria-pressed="false" aria-label="静音或开启音频">静音</button>
    </main>

    <script type="module" src="src/js/main.js"></script>
  </body>
  </html>
