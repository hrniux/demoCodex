<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - 滑块拼图</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #0a0e1a 0%, #141b2d 100%);
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .title { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; }

  .scores {
    display: flex;
    gap: 8px;
  }

  .score-box {
    background: #1c2333;
    border: 1px solid #2a3348;
    border-radius: 8px;
    padding: 6px 16px;
    text-align: center;
    min-width: 72px;
  }

  .score-box .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    color: #8892a4;
    letter-spacing: 1px;
  }

  .score-box .value {
    font-size: 1.25rem;
    font-weight: 700;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .hint { font-size: 0.8rem; color: #8892a4; }

  .btn {
    background: #2a3348;
    color: #fff;
    border: 1px solid #3a4560;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: #3a4560; }

  .board {
    position: relative;
    background: #1c2333;
    border: 1px solid #2a3348;
    border-radius: 12px;
    padding: 8px;
    aspect-ratio: 1;
    width: 100%;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    height: 100%;
  }

  .cell {
    background: #252d40;
    border-radius: 8px;
  }

  .tiles {
    position: absolute;
    inset: 8px;
  }

  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    border-radius: 8px;
    transition: top 0.12s ease, left 0.12s ease;
    z-index: 1;
  }

  .tile.new {
    animation: popIn 0.2s ease;
  }

  .tile.merged {
    animation: pulse 0.2s ease;
    z-index: 2;
  }

  @keyframes popIn {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 14, 26, 0.75);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay .msg {
    font-size: 1.6rem;
    font-weight: 800;
  }

  @media (max-width: 460px) {
    .container { padding: 12px; }
    .title { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">最佳</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <span class="hint">方向键 / 滑动操作</span>
    <button class="btn" id="newGameBtn">新游戏</button>
  </div>
  <div class="board" id="board">
    <div class="grid">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="tiles" id="tiles"></div>
    <div class="overlay" id="overlay">
      <div class="msg" id="overlayMsg"></div>
      <button class="btn" id="overlayBtn"></button>
    </div>
  </div>
</div>

<script>
(function () {
  const SIZE = 4;
  const TILE_COLORS = {
    2:'#4a4a5a',4:'#5a5a6a',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',
    128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'
  };

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const tilesEl = document.getElementById('tiles');
  const board = document.getElementById('board');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const overlayBtn = document.getElementById('overlayBtn');

  let grid, score, best, won, keepPlaying, moving;

  best = parseInt(localStorage.getItem('best2048') || '0', 10);
  bestEl.textContent = best;

  function init() {
    grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    score = 0; won = false; keepPlaying = false; moving = false;
    scoreEl.textContent = '0';
    overlay.classList.remove('active');
    addRandom();
    addRandom();
    render();
  }

  function addRandom() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!grid[r][c]) empty.push([r, c]);
    if (!empty.length) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return [r, c];
  }

  function tileSize() {
    const boardRect = tilesEl.getBoundingClientRect();
    const gap = 8;
    return (boardRect.width - gap * (SIZE - 1)) / SIZE;
  }

  function posStyle(r, c, ts) {
    const gap = 8;
    return {
      top: r * (ts + gap) + 'px',
      left: c * (ts + gap) + 'px',
      width: ts + 'px',
      height: ts + 'px'
    };
  }

  function tileColor(v) { return TILE_COLORS[v] || '#b8860b'; }
  function textColor(v) { return v <= 4 ? '#ccc' : '#fff'; }
  function fontSize(v) {
    if (v < 100) return '2rem';
    if (v < 1000) return '1.6rem';
    return '1.25rem';
  }

  let newTiles = [], mergedTiles = [];

  function render() {
    tilesEl.innerHTML = '';
    const ts = tileSize();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = grid[r][c];
        if (!v) continue;
        const el = document.createElement('div');
        el.className = 'tile';
        if (newTiles.some(t => t[0] === r && t[1] === c)) el.classList.add('new');
        if (mergedTiles.some(t => t[0] === r && t[1] === c)) el.classList.add('merged');
        const s = posStyle(r, c, ts);
        Object.assign(el.style, s);
        el.style.background = tileColor(v);
        el.style.color = textColor(v);
        el.style.fontSize = fontSize(v);
        el.textContent = v;
        tilesEl.appendChild(el);
      }
    }
    newTiles = [];
    mergedTiles = [];
  }

  function slide(row) {
    let arr = row.filter(v => v);
    let merged = [];
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        score += arr[i];
        merged.push(arr[i]);
        arr.splice(i + 1, 1);
      }
    }
    while (arr.length < SIZE) arr.push(0);
    return { result: arr, merged };
  }

  function move(dir) {
    if (moving) return;
    let changed = false;
    mergedTiles = [];

    const getRow = (i, d) => {
      if (d === 'left')  return grid[i].slice();
      if (d === 'right') return grid[i].slice().reverse();
      if (d === 'up')    return grid.map(r => r[i]);
      return grid.map(r => r[i]).reverse();
    };
    const setRow = (i, arr, d) => {
      if (d === 'right' || d === 'down') arr.reverse();
      for (let j = 0; j < SIZE; j++) {
        if (d === 'left' || d === 'right') {
          if (grid[i][j] !== arr[j]) changed = true;
          grid[i][j] = arr[j];
        } else {
          if (grid[j][i] !== arr[j]) changed = true;
          grid[j][i] = arr[j];
        }
      }
    };

    for (let i = 0; i < SIZE; i++) {
      const row = getRow(i, dir);
      const { result } = slide(row);
      setRow(i, result, dir);
    }

    // track merged positions
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] >= 4) {
          // simple heuristic: mark if value just increased (handled via changed)
        }

    if (!changed) return;

    moving = true;
    render(); // show slide positions

    setTimeout(() => {
      const nt = addRandom();
      if (nt) newTiles = [nt];
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('best2048', best);
      }
      render();
      moving = false;

      if (!won && !keepPlaying && hasValue(2048)) {
        won = true;
        showOverlay('你赢了!', '继续游戏', () => { keepPlaying = true; overlay.classList.remove('active'); });
      } else if (!canMove()) {
        showOverlay('游戏结束', '再来一局', init);
      }
    }, 130);
  }

  function hasValue(v) {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === v) return true;
    return false;
  }

  function canMove() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return true;
        if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
        if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
      }
    return false;
  }

  function showOverlay(msg, btnText, action) {
    overlayMsg.textContent = msg;
    overlayBtn.textContent = btnText;
    overlayBtn.onclick = action;
    overlay.classList.add('active');
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  });

  // Touch / swipe
  let tx, ty;
  board.addEventListener('touchstart', e => {
    const t = e.touches[0];
    tx = t.clientX; ty = t.clientY;
  }, { passive: true });

  board.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - tx, dy = t.clientY - ty;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 30) return;
    if (adx > ady) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }, { passive: true });

  document.getElementById('newGameBtn').addEventListener('click', init);

  init();
})();
</script>
</body>
</html>
