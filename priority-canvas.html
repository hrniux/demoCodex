<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Priority Canvas 优先级画布：根据影响、投入、期限和依赖，生成更清晰的任务排序建议。"
    />
    <meta name="theme-color" content="#18201a" />
    <title>Priority Canvas 优先级画布 | DemoCodex</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23f7b267'/%3E%3Cstop offset='1' stop-color='%2318201a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Crect x='12' y='14' width='18' height='18' rx='4' fill='%2398f5ff' opacity='.92'/%3E%3Crect x='34' y='14' width='18' height='18' rx='4' fill='%239ef0b3' opacity='.9'/%3E%3Crect x='12' y='36' width='18' height='18' rx='4' fill='%23f7b267' opacity='.9'/%3E%3Crect x='34' y='36' width='18' height='18' rx='4' fill='%23fff3' opacity='.78'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="src/css/priority-canvas.css" />
  </head>
  <body class="priority-page">
    <main class="priority-shell">
      <section class="priority-hero">
        <a class="priority-back" href="index.html">返回首页</a>
        <p class="priority-hero__eyebrow">Impact · Effort · Deadline · Dependency</p>
        <h1 class="priority-hero__title">Priority Canvas / 优先级画布</h1>
        <p class="priority-hero__lead">
          输入影响、投入、期限和依赖，画布会把任务放进明确的位置：
          先做、计划做、顺手做，还是先拆依赖再推进。
        </p>
      </section>

      <section class="priority-layout" aria-label="优先级画布工具">
        <section class="priority-panel priority-panel--form">
          <div class="priority-panel__header">
            <h2>输入信息</h2>
            <p>这不是排队表，而是帮助你挑出今天应该先动哪一件事。</p>
          </div>

          <form id="priority-form" class="priority-form">
            <label class="priority-field">
              <span>任务名称</span>
              <input
                id="priority-title"
                name="priority-title"
                type="text"
                placeholder="例如：修复登录、补文档、对外确认方案"
                autocomplete="off"
              />
            </label>

            <label class="priority-field">
              <span>影响</span>
              <select id="priority-impact" name="priority-impact">
                <option value="1">1 - 影响很小</option>
                <option value="2">2 - 影响有限</option>
                <option value="3" selected>3 - 中等影响</option>
                <option value="4">4 - 高影响</option>
                <option value="5">5 - 关键影响</option>
              </select>
            </label>

            <label class="priority-field">
              <span>投入</span>
              <select id="priority-effort" name="priority-effort">
                <option value="1">1 - 很省时</option>
                <option value="2">2 - 低投入</option>
                <option value="3" selected>3 - 中等投入</option>
                <option value="4">4 - 较高投入</option>
                <option value="5">5 - 很重投入</option>
              </select>
            </label>

            <label class="priority-field">
              <span>期限</span>
              <select id="priority-deadline" name="priority-deadline">
                <option value="today">今天</option>
                <option value="this-week" selected>本周</option>
                <option value="this-month">本月</option>
                <option value="flexible">较灵活</option>
              </select>
            </label>

            <label class="priority-field">
              <span>依赖</span>
              <select id="priority-dependency" name="priority-dependency">
                <option value="none" selected>没有明显依赖</option>
                <option value="few">有少量依赖</option>
                <option value="many">依赖较多</option>
              </select>
            </label>

            <div class="priority-actions">
              <button class="priority-button" type="submit">生成画布</button>
              <button class="priority-button priority-button--ghost" id="priority-reset" type="reset">
                重置默认值
              </button>
            </div>

            <p class="priority-note">
              提示：影响越高、期限越近、依赖越少，越应该靠前；投入越高但影响不大时，通常应该往后放。
            </p>
          </form>
        </section>

        <section
          class="priority-panel priority-panel--result"
          id="priority-result"
          tabindex="-1"
          aria-live="polite"
        >
          <div class="priority-panel__header">
            <h2>画布结果</h2>
            <p>把任务放到合适的位置，比盲目开始更重要。</p>
          </div>

          <div class="priority-empty" id="priority-empty">
            输入信息后，这里会展示优先级得分、位置判断、推进建议和依赖处理方式。
          </div>

          <div class="priority-result" id="priority-result-body" hidden>
            <div class="priority-result__summary">
              <p class="priority-result__eyebrow" id="priority-mode"></p>
              <h3 class="priority-result__title" id="priority-title-display"></h3>
              <p class="priority-result__lead" id="priority-lead"></p>
              <div class="priority-meta" id="priority-meta"></div>
            </div>

            <div class="priority-grid">
              <article class="priority-card priority-canvas">
                <h3>优先级画布</h3>
                <div id="priority-board" class="priority-board" aria-label="优先级画布"></div>
              </article>

              <article class="priority-card">
                <h3>为什么这样排</h3>
                <div id="priority-reasons"></div>
              </article>

              <article class="priority-card">
                <h3>下一步动作</h3>
                <div id="priority-next"></div>
              </article>

              <article class="priority-card">
                <h3>风险与依赖</h3>
                <div id="priority-risks"></div>
              </article>
            </div>

            <div class="priority-actions priority-actions--result">
              <button class="priority-button" id="priority-regenerate" type="button">再生成一次</button>
              <button class="priority-button priority-button--ghost" id="priority-clear" type="button">
                清空结果
              </button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="src/js/priority-canvas.js"></script>
  </body>
</html>
